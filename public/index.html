<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zézin</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: #111;
    --surface2: #1a1a1a;
    --border: #222;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #ffdf00;
    --accent2: #f97316;
    --verde: #22c55e;
    --bubble-bot: #141414;
    --bubble-user: #0d1117;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }

  /* SPLASH */
  #splash {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 1000; gap: 0;
  }
  .splash-emoji { font-size: 80px; animation: wave 1s ease-in-out infinite, fadeInUp 0.6s ease forwards; transform-origin: 70% 80%; margin-bottom: 16px; }
  @keyframes wave { 0%,100%{transform:rotate(0deg)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
  .splash-name { font-family:'Baloo 2',cursive; font-size:3rem; font-weight:800; color:var(--accent); animation:fadeInUp 0.6s ease 0.2s both; letter-spacing:-1px; }
  .splash-presents { font-size:0.72rem; color:var(--muted); letter-spacing:3px; text-transform:uppercase; animation:fadeInUp 0.6s ease 0.5s both; margin-top:60px; }
  .splash-bar { width:120px; height:2px; background:var(--border); border-radius:2px; margin-top:8px; animation:fadeInUp 0.6s ease 0.6s both; overflow:hidden; }
  .splash-bar-fill { height:100%; background:var(--accent); border-radius:2px; animation:loadBar 1.8s ease 0.8s both; }
  @keyframes loadBar { from{width:0%}to{width:100%} }
  #splash.hide { animation:splashOut 0.5s ease forwards; }
  @keyframes splashOut { to{opacity:0;pointer-events:none} }

  /* LOGIN */
  #login-screen { position:fixed; inset:0; background:#000; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:900; padding:40px 24px; }
  #login-screen.show { display:flex; }
  .login-logo { font-size:52px; margin-bottom:12px; animation:wave 1.5s ease-in-out infinite; transform-origin:70% 80%; display:inline-block; }
  .login-title { font-family:'Baloo 2',cursive; font-size:2rem; font-weight:800; color:var(--accent); margin-bottom:6px; }
  .login-sub { color:var(--muted); font-size:0.88rem; text-align:center; margin-bottom:36px; line-height:1.5; }
  .login-box { width:100%; max-width:340px; display:flex; flex-direction:column; gap:12px; }
  .login-input { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:13px 16px; color:var(--text); font-size:0.95rem; font-family:'Nunito',sans-serif; outline:none; transition:border-color 0.2s; }
  .login-input:focus { border-color:var(--accent); }
  .login-input::placeholder { color:var(--muted); }
  .btn-primary { background:var(--accent); color:#000; border:none; border-radius:12px; padding:13px; font-weight:800; font-size:0.95rem; font-family:'Nunito',sans-serif; cursor:pointer; transition:opacity 0.2s,transform 0.15s; }
  .btn-primary:hover { opacity:0.88; transform:scale(1.02); }
  .divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:0.8rem; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .btn-google { background:var(--surface); border:1.5px solid var(--border); border-radius:12px; padding:13px; color:var(--text); font-size:0.92rem; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:border-color 0.2s,background 0.2s; }
  .btn-google:hover { border-color:#444; background:#1a1a1a; }
  .login-switch { text-align:center; font-size:0.82rem; color:var(--muted); }
  .login-switch span { color:var(--accent); cursor:pointer; font-weight:700; }

  /* APP */
  #app { display:none; height:100dvh; flex-direction:row; }
  #app.show { display:flex; }

  /* SIDEBAR */
  #sidebar { width:256px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; transition:transform 0.3s ease; }
  .sidebar-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .sidebar-logo { display:flex; align-items:center; gap:8px; font-family:'Baloo 2',cursive; font-weight:800; font-size:1.1rem; color:var(--accent); }
  .btn-new-chat { background:var(--accent); border:none; border-radius:8px; padding:6px 12px; font-size:0.78rem; font-weight:800; color:#000; cursor:pointer; font-family:'Nunito',sans-serif; transition:opacity 0.2s; }
  .btn-new-chat:hover { opacity:0.85; }
  .chats-list { flex:1; overflow-y:auto; padding:8px; }
  .chats-list::-webkit-scrollbar { width:4px; }
  .chats-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .chat-section-label { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; padding:8px 8px 4px; }
  .chat-item { padding:9px 12px; border-radius:10px; cursor:pointer; font-size:0.83rem; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:background 0.15s; display:flex; align-items:center; gap:8px; }
  .chat-item:hover { background:var(--surface2); color:var(--text); }
  .chat-item.active { background:var(--surface2); color:var(--text); }
  .sidebar-footer { border-top:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:10px; }
  .user-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; overflow:hidden; }
  .user-avatar img { width:100%; height:100%; object-fit:cover; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:0.83rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-email { font-size:0.7rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btn-logout { background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:4px; transition:color 0.2s; }
  .btn-logout:hover { color:#ff4444; }

  /* MAIN */
  #main { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); }
  #mobile-header { display:none; padding:12px 16px; border-bottom:1px solid var(--border); align-items:center; gap:12px; }
  .btn-menu { background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; }
  .mobile-title { font-family:'Baloo 2',cursive; font-weight:800; font-size:1.1rem; color:var(--accent); flex:1; }

  /* CHAT */
  #chat { flex:1; overflow-y:auto; padding:24px 16px 16px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
  #chat::-webkit-scrollbar { width:5px; }
  #chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

  #empty-state { margin:auto; text-align:center; padding:20px; }
  #empty-state .big { font-size:56px; display:inline-block; animation:wave 1.5s ease-in-out infinite; transform-origin:70% 80%; margin-bottom:10px; }
  #empty-state h2 { font-family:'Baloo 2',cursive; font-size:1.5rem; color:var(--accent); margin-bottom:6px; }
  #empty-state p { color:var(--muted); font-size:0.87rem; line-height:1.6; }
  .chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:20px; }
  .chip { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:8px 16px; font-size:0.82rem; cursor:pointer; color:#aaa; font-family:'Nunito',sans-serif; transition:all 0.2s; }
  .chip:hover { border-color:var(--accent); color:var(--accent); }

  .msg { display:flex; gap:10px; align-items:flex-start; animation:fadeInUp 0.2s ease; }
  .msg.user { flex-direction:row-reverse; }
  .msg-av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; margin-top:2px; overflow:hidden; }
  .msg.bot .msg-av { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
  .msg.user .msg-av { background:#111; border:1px solid var(--border); }
  .msg.user .msg-av img { width:100%; height:100%; object-fit:cover; }
  .bubble { max-width:80%; padding:11px 15px; border-radius:16px; font-size:0.92rem; line-height:1.65; word-break:break-word; }
  .msg.bot .bubble { background:var(--bubble-bot); border:1px solid var(--border); border-top-left-radius:4px; }
  .msg.user .bubble { background:var(--bubble-user); border:1px solid #1e2a4a; border-top-right-radius:4px; }

  .dots { display:flex; gap:5px; padding:4px 0; }
  .dots span { width:7px; height:7px; background:var(--muted); border-radius:50%; animation:bounce 1.1s infinite; }
  .dots span:nth-child(2) { animation-delay:0.18s; }
  .dots span:nth-child(3) { animation-delay:0.36s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)} }

  /* BAR */
  #bar { padding:12px 16px 20px; border-top:1px solid var(--border); background:var(--bg); }
  .bar-inner { max-width:760px; margin:0 auto; display:flex; gap:10px; align-items:flex-end; }
  #inp { flex:1; background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:12px 16px; color:var(--text); font-size:0.93rem; font-family:'Nunito',sans-serif; outline:none; resize:none; max-height:120px; transition:border-color 0.2s; line-height:1.5; }
  #inp:focus { border-color:#333; }
  #inp::placeholder { color:var(--muted); }
  #send { width:44px; height:44px; background:var(--accent); border:none; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; transition:transform 0.15s,opacity 0.2s; color:#000; font-weight:800; }
  #send:hover { transform:scale(1.07); }
  #send:active { transform:scale(0.94); }
  #send:disabled { opacity:0.3; cursor:not-allowed; transform:none; }

  #overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50; }

  @media(max-width:640px) {
    #sidebar { position:fixed; top:0; left:0; bottom:0; z-index:100; transform:translateX(-100%); }
    #sidebar.open { transform:translateX(0); }
    #mobile-header { display:flex; }
    #overlay.show { display:block; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-emoji">🤙</div>
  <div class="splash-name">Zézin</div>
  <div class="splash-presents">Alzhadys Presents</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<div id="login-screen">
  <div class="login-logo">🤙</div>
  <div class="login-title">Zézin</div>
  <p class="login-sub">Entra aí, meu consagrado.<br>Tua IA brasileira tá esperando. 🔥</p>
  <div class="login-box">
    <input class="login-input" id="login-email" type="email" placeholder="Email">
    <input class="login-input" id="login-pass" type="password" placeholder="Senha">
    <button class="btn-primary" onclick="loginEmail()">Entrar 🚀</button>
    <div class="divider">ou</div>
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
    <div class="login-switch">Não tem conta? <span onclick="alert('Digite email e senha e clica Entrar — cria automático! 🤙')">Criar agora</span></div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🤙 Zézin</div>
      <button class="btn-new-chat" onclick="newChat()">+ Novo</button>
    </div>
    <div class="chats-list" id="chats-list">
      <div class="chat-section-label">Conversas</div>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar">😎</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Usuário</div>
        <div class="user-email" id="user-email"></div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sair">↪</button>
    </div>
  </div>

  <div id="main">
    <div id="mobile-header">
      <button class="btn-menu" onclick="toggleSidebar()">☰</button>
      <div class="mobile-title">🤙 Zézin</div>
    </div>
    <div id="chat">
      <div id="empty-state">
        <div class="big">🤙</div>
        <h2>E aí, parceiro!</h2>
        <p>Pode mandar o papo.<br>Tô aqui pra resolver, não pra enrolar.</p>
        <div class="chips">
          <button class="chip" onclick="sendChip('Quem é você Zézin?')">Quem é o Zézin? 👑</button>
          <button class="chip" onclick="sendChip('Me ensina script bash do zero')">Script Bash 💻</button>
          <button class="chip" onclick="sendChip('Como uso API com Python?')">API com Python ⚡</button>
          <button class="chip" onclick="sendChip('Como automatizar tarefas com script?')">Automação 🤖</button>
        </div>
      </div>
    </div>
    <div id="bar">
      <div class="bar-inner">
        <textarea id="inp" rows="1" placeholder="Manda ver..."></textarea>
        <button id="send" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

  // ⚠️ SUBSTITUI PELOS DADOS DO SEU PROJETO NO FIREBASE CONSOLE
  const firebaseConfig = {

    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJETO",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SEU_ID",
    appId: "SEU_APP_ID"
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const db = getFirestore(fbApp);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let currentChatId = null;
  let chatHistory = [];

  // SPLASH
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
  }, 2800);

  // AUTH
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
      document.getElementById('user-email').textContent = user.email;
      if (user.photoURL) document.getElementById('user-avatar').innerHTML = `<img src="${user.photoURL}">`;
      document.getElementById('login-screen').classList.remove('show');
      document.getElementById('app').classList.add('show');
      await loadChats();
    } else {
      document.getElementById('login-screen').classList.add('show');
      document.getElementById('app').classList.remove('show');
    }
  });

  window.loginEmail = async () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch { try { await createUserWithEmailAndPassword(auth, email, pass); } catch(e) { alert('Erro: ' + e.message); } }
  };

  window.loginGoogle = async () => {
    try { await signInWithPopup(auth, provider); } catch(e) { alert('Erro: ' + e.message); }
  };

  window.logout = async () => await signOut(auth);

  async function loadChats() {
    if (!currentUser) return;
    try {
      const q = query(collection(db, `users/${currentUser.uid}/chats`), orderBy('updatedAt', 'desc'));
      const snap = await getDocs(q);
      const list = document.getElementById('chats-list');
      list.innerHTML = '<div class="chat-section-label">Conversas</div>';
      snap.forEach(d => {
        const item = document.createElement('div');
        item.className = 'chat-item';
        item.id = 'chat-item-' + d.id;
        item.innerHTML = `<span>💬</span>${d.data().title || 'Nova conversa'}`;
        item.onclick = () => loadChat(d.id, d.data());
        list.appendChild(item);
      });
    } catch(e) { console.log('Firebase não configurado ainda'); }
  }

        <h2>E aí, parceiro!</h2>
        <p>Pode mandar o papo.<br>Tô aqui pra resolver, não pra enrolar.</p>
        <div class="chips">
          <button class="chip" onclick="sendChip('Quem é você Zézin?')">Quem é o Zézin? 👑</button>
          <button class="chip" onclick="sendChip('Me ensina script bash do zero')">Script Bash 💻</button>
          <button class="chip" onclick="sendChip('Como uso API com Python?')">API com Python ⚡</button>
          <button class="chip" onclick="sendChip('Como automatizar tarefas com script?')">Automação 🤖</button>
        </div>
      </div>`;
    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
    closeSidebar();
  };

  window.loadChat = (id, data) => {
    currentChatId = id;
    chatHistory = data.messages || [];
    document.getElementById('chat').innerHTML = '';
    chatHistory.forEach(m => addBubble(m.role === 'user' ? 'user' : 'bot', m.content));
    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
    document.getElementById('chat-item-' + id)?.classList.add('active');
    closeSidebar();
  };

  window.sendMessage = async (text) => {
    const userText = text || document.getElementById('inp').value.trim();
    if (!userText) return;
    document.getElementById('inp').value = '';
    document.getElementById('inp').style.height = 'auto';
    document.getElementById('send').disabled = true;
    document.getElementById('empty-state')?.remove();
    addBubble('user', userText);
    chatHistory.push({ role: 'user', content: userText });

    const typingDiv = document.createElement('div');
    typingDiv.className = 'msg bot'; typingDiv.id = 'typing';
    typingDiv.innerHTML = `<div class="msg-av">🤙</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
    document.getElementById('chat').appendChild(typingDiv);
    document.getElementById('chat').scrollTop = 99999;

    try {
      const res = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:chatHistory}) });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      const reply = data.reply || data.error || 'Deu ruim aqui mano 😅';
      addBubble('bot', reply);
      chatHistory.push({ role:'assistant', content:reply });

      if (currentUser) {

          if (!currentChatId) {
   header {
    width: 100%;
    max-width: 700px;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 13px;
    border-bottom: 1.5px solid rgba(255,223,0,0.12);
    background: rgba(15,26,46,0.97);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }

  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffdf00 30%, #f97316);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    animation: pulsar 3s ease-in-out infinite;
  }
  @keyframes pulsar {
    0%,100% { box-shadow: 0 0 0 3px rgba(255,223,0,0.15); }
    50%      { box-shadow: 0 0 0 7px rgba(255,223,0,0.35), 0 0 20px rgba(255,223,0,0.1); }
  }

  .header-info h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--amarelo);
    line-height: 1;
  }
  .header-info p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
    display: flex; align-items: center; gap: 5px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--verde);
    border-radius: 50%;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    width: 100%;
    max-width: 700px;
    overflow-y: auto;
    padding: 20px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  /* scrollbar */
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

  /* EMPTY STATE */
  #empty-state {
    margin: auto;
    text-align: center;
    padding: 20px;
  }
  #empty-state .big { font-size: 64px; margin-bottom: 10px; }
  #empty-state h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    color: var(--amarelo);
    margin-bottom: 6px;
  }
  #empty-state p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 18px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid rgba(255,223,0,0.18);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    transition: background 0.2s, border-color 0.2s;
  }
  .chip:hover { background: rgba(255,223,0,0.1); border-color: rgba(255,223,0,0.4); }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 9px;
    align-items: flex-end;
    animation: aparecer 0.2s ease;
  }
  @keyframes aparecer {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-av {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .msg.bot .msg-av  { background: linear-gradient(135deg, #ffdf00, #f97316); }
  .msg.user .msg-av { background: #1b3d7a; }

  .bubble {
    max-width: 72%;
    padding: 10px 15px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    border-bottom-right-radius: 4px;
  }

  /* TYPING */
  .typing .bubble { padding: 12px 16px; }
  .dots { display: flex; gap: 5px; }
  .dots span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.1s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-7px); }
  }

  /* INPUT BAR */
  #bar {
    width: 100%;
    max-width: 700px;
    padding: 12px 16px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(15,26,46,0.97);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  #inp {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 11px 15px;
    color: var(--text);
    font-size: 0.93rem;
    font-family: 'Nunito', sans-serif;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #inp:focus { border-color: rgba(255,223,0,0.35); }
  #inp::placeholder { color: var(--muted); }

  #send {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #009c3b, #00c44a);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
  }
  #send:hover  { transform: scale(1.07); }
  #send:active { transform: scale(0.94); }
  #send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<header>
  <div class="avatar">🤙</div>
  <div class="header-info">
    <h1>Zézin</h1>
    <p><span class="dot"></span> Online agora • Seu parceiro brasileiro</p>
  </div>
</header>

<div id="chat">
  <div id="empty-state">
    <div class="big">⚡</div>
    <h2>Zézin na área, meu consagrado.</h2>
    <p>IA brasileira. Expert em scripts. Ego enorme, entrega maior ainda.<br>Pode mandar — vou te explicar tudo passo a passo. 🔥</p>
    <div class="chips">
      <button class="chip" onclick="sendChip('Quem é você Zézin? Me apresenta')">Quem é o Zézin? 👑</button>
      <button class="chip" onclick="sendChip('Me ensina a criar um script bash do zero, passo a passo')">Script Bash do zero 💻</button>
      <button class="chip" onclick="sendChip('Me ensina a usar API com Python de forma simples')">API com Python ⚡</button>
      <button class="chip" onclick="sendChip('Como automatizar tarefas no computador com script?')">Automatizar tarefas 🤖</button>
    </div>
  </div>
</div>

<div id="bar">
  <textarea id="inp" rows="1" placeholder="Manda ver, parceiro..."></textarea>
  <button id="send" onclick="sendMessage()">🚀</button>
</div>

<script>
  // ⚠️ Em produção, aponta pra sua URL do servidor (Railway, Render, etc.)
  // Ex: const API_URL = "https://zezin.up.railway.app/api/chat";
  const API_URL = "/api/chat";

  const history = [];
  const chat = document.getElementById("chat");
  const inp = document.getElementById("inp");
  const sendBtn = document.getElementById("send");

  // Auto-resize textarea
  inp.addEventListener("input", () => {
    inp.style.height = "auto";
    inp.style.height = Math.min(inp.scrollHeight, 120) + "px";
  });

  inp.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function removeEmpty() {
    const es = document.getElementById("empty-state");
    if (es) es.remove();
  }

  function addMessage(role, text) {
    removeEmpty();
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const av = role === "bot" ? "🤙" : "😎";
    div.innerHTML = `
      <div class="msg-av">${av}</div>
      <div class="bubble">${text.replace(/\n/g, "<br>")}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping() {
    removeEmpty();
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = "typing";
    div.innerHTML = `
      <div class="msg-av">🤙</div>
      <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage(text) {
    const userText = text || inp.value.trim();
    if (!userText) return;

    inp.value = "";
    inp.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", userText);
    history.push({ role: "user", content: userText });

    addTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage("bot", "Ó mano, deu um erro aqui: " + data.error + " 😬");
      } else {
        addMessage("bot", data.reply);
        history.push({ role: "assistant", content: data.reply });
      }
    } catch (err) {
      removeTyping();
      addMessage("bot", "Cara, não consegui me conectar ao servidor não. Tenta de novo? 😅");
    }

    sendBtn.disabled = false;
    inp.focus();
  }

  function sendChip(text) { sendMessage(text); }
</script>

</body>
  </html>
