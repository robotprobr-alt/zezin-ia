<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zézin 🇧🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #009c3b;
    --amarelo: #ffdf00;
    --azul: #002776;
    --bg: #0f1a2e;
    --surface: #1a2a42;
    --text: #f0f4ff;
    --muted: #7a96c0;
    --bubble-bot: #1b3050;
    --bubble-user: #1b3d7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image:
      radial-gradient(ellipse at 10% 80%, rgba(0,156,59,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 10%, rgba(255,223,0,0.05) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    width: 100%;
    max-width: 700px;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 13px;
    border-bottom: 1.5px solid rgba(255,223,0,0.12);
    background: rgba(15,26,46,0.97);
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }

  .avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffdf00 30%, #f97316);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    animation: pulsar 3s ease-in-out infinite;
  }
  @keyframes pulsar {
    0%,100% { box-shadow: 0 0 0 3px rgba(255,223,0,0.15); }
    50%      { box-shadow: 0 0 0 7px rgba(255,223,0,0.35), 0 0 20px rgba(255,223,0,0.1); }
  }

  .header-info h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.45rem;
    font-weight: 800;
    color: var(--amarelo);
    line-height: 1;
  }
  .header-info p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
    display: flex; align-items: center; gap: 5px;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--verde);
    border-radius: 50%;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  /* CHAT AREA */
  #chat {
    flex: 1;
    width: 100%;
    max-width: 700px;
    overflow-y: auto;
    padding: 20px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  /* scrollbar */
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

  /* EMPTY STATE */
  #empty-state {
    margin: auto;
    text-align: center;
    padding: 20px;
  }
  #empty-state .big { font-size: 64px; margin-bottom: 10px; }
  #empty-state h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    color: var(--amarelo);
    margin-bottom: 6px;
  }
  #empty-state p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 18px;
  }
  .chip {
    background: var(--surface);
    border: 1px solid rgba(255,223,0,0.18);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    transition: background 0.2s, border-color 0.2s;
  }
  .chip:hover { background: rgba(255,223,0,0.1); border-color: rgba(255,223,0,0.4); }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 9px;
    align-items: flex-end;
    animation: aparecer 0.2s ease;
  }
  @keyframes aparecer {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-av {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .msg.bot .msg-av  { background: linear-gradient(135deg, #ffdf00, #f97316); }
  .msg.user .msg-av { background: #1b3d7a; }

  .bubble {
    max-width: 72%;
    padding: 10px 15px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg.bot .bubble {
    background: var(--bubble-bot);
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    border-bottom-right-radius: 4px;
  }

  /* TYPING */
  .typing .bubble { padding: 12px 16px; }
  .dots { display: flex; gap: 5px; }
  .dots span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.1s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.18s; }
  .dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30%          { transform: translateY(-7px); }
  }

  /* INPUT BAR */
  #bar {
    width: 100%;
    max-width: 700px;
    padding: 12px 16px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(15,26,46,0.97);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.05);
    flex-shrink: 0;
  }

  #inp {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 11px 15px;
    color: var(--text);
    font-size: 0.93rem;
    font-family: 'Nunito', sans-serif;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #inp:focus { border-color: rgba(255,223,0,0.35); }
  #inp::placeholder { color: var(--muted); }

  #send {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #009c3b, #00c44a);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
  }
  #send:hover  { transform: scale(1.07); }
  #send:active { transform: scale(0.94); }
  #send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
</style>
</head>
<body>

<header>
  <div class="avatar">🤙</div>
  <div class="header-info">
    <h1>Zézin</h1>
    <p><span class="dot"></span> Online agora • Seu parceiro brasileiro</p>
  </div>
</header>

<div id="chat">
  <div id="empty-state">
    <div class="big">⚡</div>
    <h2>Zézin na área, meu consagrado.</h2>
    <p>IA brasileira. Expert em scripts. Ego enorme, entrega maior ainda.<br>Pode mandar — vou te explicar tudo passo a passo. 🔥</p>
    <div class="chips">
      <button class="chip" onclick="sendChip('Quem é você Zézin? Me apresenta')">Quem é o Zézin? 👑</button>
      <button class="chip" onclick="sendChip('Me ensina a criar um script bash do zero, passo a passo')">Script Bash do zero 💻</button>
      <button class="chip" onclick="sendChip('Me ensina a usar API com Python de forma simples')">API com Python ⚡</button>
      <button class="chip" onclick="sendChip('Como automatizar tarefas no computador com script?')">Automatizar tarefas 🤖</button>
    </div>
  </div>
</div>

<div id="bar">
  <textarea id="inp" rows="1" placeholder="Manda ver, parceiro..."></textarea>
  <button id="send" onclick="sendMessage()">🚀</button>
</div>

<script>
  // ⚠️ Em produção, aponta pra sua URL do servidor (Railway, Render, etc.)
  // Ex: const API_URL = "https://zezin.up.railway.app/api/chat";
  const API_URL = "/api/chat";

  const history = [];
  const chat = document.getElementById("chat");
  const inp = document.getElementById("inp");
  const sendBtn = document.getElementById("send");

  // Auto-resize textarea
  inp.addEventListener("input", () => {
    inp.style.height = "auto";
    inp.style.height = Math.min(inp.scrollHeight, 120) + "px";
  });

  inp.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function removeEmpty() {
    const es = document.getElementById("empty-state");
    if (es) es.remove();
  }

  function addMessage(role, text) {
    removeEmpty();
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    const av = role === "bot" ? "🤙" : "😎";
    div.innerHTML = `
      <div class="msg-av">${av}</div>
      <div class="bubble">${text.replace(/\n/g, "<br>")}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping() {
    removeEmpty();
    const div = document.createElement("div");
    div.className = "msg bot typing";
    div.id = "typing";
    div.innerHTML = `
      <div class="msg-av">🤙</div>
      <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage(text) {
    const userText = text || inp.value.trim();
    if (!userText) return;

    inp.value = "";
    inp.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", userText);
    history.push({ role: "user", content: userText });

    addTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage("bot", "Ó mano, deu um erro aqui: " + data.error + " 😬");
      } else {
        addMessage("bot", data.reply);
        history.push({ role: "assistant", content: data.reply });
      }
    } catch (err) {
      removeTyping();
      addMessage("bot", "Cara, não consegui me conectar ao servidor não. Tenta de novo? 😅");
    }

    sendBtn.disabled = false;
    inp.focus();
  }

  function sendChip(text) { sendMessage(text); }
</script>

</body>
  </html>
